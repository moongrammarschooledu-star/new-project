<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon Grammar School — AI Assistant</title>
<link rel="icon" href="/static/logo.jpg">
<style>
  :root {
    --navy: #14213d; --gold: #fca311; --cream: #fdf6e9; --ink: #1b1b1b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: var(--cream); color: var(--ink);
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    background: var(--navy); color: white; padding: 14px 20px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  header img.logo { height: 40px; width: auto; background: white; border-radius: 8px; padding: 3px; }
  header h1 { font-size: 20px; font-weight: normal; }
  header h1 b { color: var(--gold); }
  .modes { margin-left: auto; display: flex; gap: 6px; }
  .modes button {
    font-family: inherit; font-size: 13px; padding: 7px 14px; cursor: pointer;
    border: 1px solid rgba(255,255,255,.35); border-radius: 20px;
    background: transparent; color: white;
  }
  .modes button.active { background: var(--gold); border-color: var(--gold); color: var(--navy); font-weight: bold; }
  #chat {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 14px; max-width: 820px; width: 100%; margin: 0 auto;
  }
  .msg { max-width: 85%; padding: 12px 16px; border-radius: 14px; line-height: 1.5; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: var(--navy); color: white; border-bottom-right-radius: 4px; }
  .msg.bot  { align-self: flex-start; background: white; border: 1px solid #e8dfcf; border-bottom-left-radius: 4px; }
  .msg.error { align-self: center; background: #fde8e8; color: #922; font-size: 14px; }
  .msg.typing { color: #888; font-style: italic; }
  form {
    display: flex; gap: 10px; padding: 16px 20px; background: white;
    border-top: 1px solid #e8dfcf; max-width: 820px; width: 100%; margin: 0 auto;
  }
  input {
    flex: 1; font-family: inherit; font-size: 16px; padding: 12px 16px;
    border: 1px solid #cbbfa8; border-radius: 24px; outline: none;
  }
  input:focus { border-color: var(--gold); }
  form button {
    font-family: inherit; font-size: 16px; padding: 12px 22px; cursor: pointer;
    background: var(--gold); color: var(--navy); border: none; border-radius: 24px; font-weight: bold;
  }
  form button:disabled { opacity: .5; cursor: wait; }
</style>
</head>
<body>
<header>
  <img class="logo" src="/static/logo.jpg" alt="MGS logo">
  <h1><b>Moon Grammar School</b> — AI Assistant</h1>
  <nav class="modes">
    <button data-mode="school" class="active">School Q&amp;A</button>
    <button data-mode="homework">Homework Helper</button>
    <button data-mode="staff">Staff Writer</button>
  </nav>
</header>

<div id="chat"></div>

<form id="form">
  <input id="input" placeholder="Ask me anything about the school…" autocomplete="off" autofocus>
  <button id="send" type="submit">Send</button>
</form>

<script>
const chat = document.getElementById('chat');
const form = document.getElementById('form');
const input = document.getElementById('input');
const send = document.getElementById('send');

let mode = 'school';
let history = [];   // [{role, content}] sent to the server each turn

const greetings = {
  school:   "Hello! 🌙 I'm the Moon Grammar School assistant. Ask me about admissions, timings, fees, uniform, or holidays!",
  homework: "Hi! I'm your homework helper. Tell me what you're studying and I'll help you understand it — step by step. 📚",
  staff:    "Hello! I help staff write notices, letters to parents, report comments, and announcements. What shall we write today? ✍️"
};

const placeholders = {
  school:   "Ask me anything about the school…",
  homework: "e.g. Can you explain fractions to me?",
  staff:    "e.g. Write a notice about the parent–teacher meeting on Friday"
};

function addMsg(text, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function setMode(newMode) {
  mode = newMode;
  history = [];
  chat.innerHTML = '';
  input.placeholder = placeholders[mode];
  document.querySelectorAll('.modes button').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === mode));
  addMsg(greetings[mode], 'bot');
}

document.querySelectorAll('.modes button').forEach(b =>
  b.addEventListener('click', () => setMode(b.dataset.mode)));

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;

  addMsg(text, 'user');
  history.push({ role: 'user', content: text });
  input.value = '';
  send.disabled = true;
  const typing = addMsg('Thinking…', 'bot typing');

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode, messages: history })
    });
    const data = await res.json();
    typing.remove();
    if (!res.ok) {
      addMsg(data.error || 'Something went wrong. Please try again.', 'error');
      history.pop(); // don't keep the failed turn
    } else {
      addMsg(data.reply, 'bot');
      history.push({ role: 'assistant', content: data.reply });
    }
  } catch {
    typing.remove();
    addMsg('Could not reach the server. Is server.py still running?', 'error');
    history.pop();
  } finally {
    send.disabled = false;
    input.focus();
  }
});

setMode('school');
</script>
</body>
</html>
